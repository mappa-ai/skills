name: Validate skills

on:
  push:
    paths:
      - internal-skills/**
      - utils-skills/**
      - .github/workflows/validate-skills.yml
  pull_request:
    paths:
      - internal-skills/**
      - utils-skills/**
      - .github/workflows/validate-skills.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill:
          - internal-skills/conduit-sdk
          - utils-skills/find-skills
          - utils-skills/grill-me
          - utils-skills/write-a-skill
          - utils-skills/handle-coderabbit
          - utils-skills/do-work
          - utils-skills/prd-to-plan
          - utils-skills/write-a-prd
          - utils-skills/bun-integration-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Validate Agent Skill spec
        run: uvx --from skills-ref agentskills validate "${{ matrix.skill }}"
