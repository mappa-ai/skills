name: Validate Conduit skill

on:
  push:
    paths:
      - conduit-sdk/**
      - .github/workflows/validate-conduit-sdk-skill.yml
  pull_request:
    paths:
      - conduit-sdk/**
      - .github/workflows/validate-conduit-sdk-skill.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Validate Agent Skill spec
        run: uvx --from skills-ref agentskills validate conduit-sdk
